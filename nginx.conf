server {
    listen 80;
    server_name localhost;

    # Force HTTPS redirect khi LB forward HTTP traffic (Viettel/VN ISP inject banner vào HTTP).
    # LB phải set X-Forwarded-Proto. Nếu user truy cập http://mentorhub.reborn.vn,
    # ISP có thể inject banner; redirect 301 sang https://... để các request sau đi qua TLS.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # HSTS — buộc browser ghi nhớ HTTPS-only sau lần truy cập HTTPS đầu tiên.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
