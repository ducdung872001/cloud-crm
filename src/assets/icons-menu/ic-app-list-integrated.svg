        <line x1="17.5" y1="17.5" x2="17.5" y2="17.5"></line>
        <line x1="16" y1="17.5" x2="19" y2="17.5" stroke-width="2"></line>
        <line x1="17.5" y1="16" x2="17.5" y2="19" stroke-width="2"></line>
      </svg>