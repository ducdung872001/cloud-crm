<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#854F0B" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <!-- QR code structure -->
        <!-- top-left finder -->
        <rect x="2" y="2" width="7" height="7" rx="1"></rect>
        <rect x="4" y="4" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
        <!-- top-right finder -->
        <rect x="15" y="2" width="7" height="7" rx="1"></rect>
        <rect x="17" y="4" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
        <!-- bottom-left finder -->
        <rect x="2" y="15" width="7" height="7" rx="1"></rect>
        <rect x="4" y="17" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
        <!-- data dots bottom-right -->
        <rect x="15" y="15" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
        <rect x="19" y="15" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
        <rect x="15" y="19" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
        <rect x="19" y="19" width="3" height="3" rx="0.5" fill="#854F0B" stroke="none"></rect>
      </svg>