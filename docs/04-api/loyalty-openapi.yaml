          schema:
            type: string
            example: seg01
      responses:
        '200':
          description: Xoa thanh cong
          content:
            application/json:
              example:
                code: 0
                message: OK
                result: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

