# ════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token hoac API key duoc truyen qua header Authorization
    HostnameAuth:
      type: apiKey
      in: header
      name: Hostname
      description: |
        Ten mien cua tenant (vi du: spa-abc.reborn.vn).
        Dung de xac dinh tenant trong he thong multi-tenant.

  parameters:
    Page:
      name: page
      in: query
      description: So trang (bat dau tu 1)
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1
    Limit:
      name: limit
      in: query
      description: So ban ghi moi trang
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
        example: 20

  schemas:
    # ── Base response ──
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: OK
        result:
          type: object

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: Ma loi (400, 401, 404, 409, 429)
          example: 400
        message:
          type: string
          example: "Thieu truong bat buoc: customerId"
        result:
          nullable: true
          example: null

    # ── Wallet ──
    Wallet:
      type: object
      properties:
        _id:
          type: string
          example: w001
        customerId:
          type: string
          example: c001
        customerName:
          type: string
          example: Nguyen Van A
        phone:
          type: string
          example: "0901234567"
        totalPoint:
          type: integer
          description: Tong diem da tich luy tu truoc den nay
          example: 1200
        usedPoint:
          type: integer
          description: Tong diem da su dung
          example: 300
        currentPoint:
          type: integer
          description: So du diem hien tai (totalPoint - usedPoint)
          example: 900
        segmentId:
          type: string
          description: ID hang thanh vien hien tai
          example: seg01
        segmentName:
          type: string
          description: Ten hang thanh vien
          example: Gold
        createdAt:
          type: string
          format: date-time
          example: "2026-01-15T08:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-10T10:30:00Z"

    WalletInput:
      type: object
      required: [customerId]
      properties:
        _id:
          type: string
          description: Truyen _id de cap nhat, bo trong de tao moi
        customerId:
          type: string
          example: c001
        customerName:
          type: string
          example: Nguyen Van A
        phone:
          type: string
          example: "0901234567"
        segmentId:
          type: string
          example: seg01

    # ── Point Ledger ──
    PointLedgerEntry:
      type: object
      properties:
        _id:
          type: string
          example: pl001
        customerId:
          type: string
          example: c001
        type:
          type: string
          enum: [earn, spend, adjust]
          description: "Loai giao dich: earn (tich), spend (tieu), adjust (dieu chinh)"
          example: earn
        point:
          type: integer
          description: So diem thay doi (duong = cong, am = tru)
          example: 100
        balance:
          type: integer
          description: So du diem sau giao dich
          example: 900
        reason:
          type: string
          example: "Mua hang don #ORD123"
        orderId:
          type: string
          nullable: true
          example: ORD123
        rewardId:
          type: string
          nullable: true
          example: null
        createdBy:
          type: string
          description: ID nguoi thuc hien (hoac "system")
          example: staff01
        createdAt:
          type: string
          format: date-time
          example: "2026-04-10T14:20:00Z"

    # ── Reward ──
    Reward:
      type: object
      properties:
        _id:
          type: string
          example: rw001
        name:
          type: string
          example: "Voucher giam 50k"
        description:
          type: string
          example: "Giam 50.000d cho don tiep theo"
        pointCost:
          type: integer
          description: So diem can de doi
          example: 100
        type:
          type: string
          enum: [voucher, gift, service, discount]
          description: "Loai phan thuong"
          example: voucher
        value:
          type: number
          description: Gia tri phan thuong (VND hoac %)
          example: 50000
        stock:
          type: integer
          description: So luong con lai
          example: 200
        isActive:
          type: boolean
          example: true
        imageUrl:
          type: string
          nullable: true
          example: "https://cdn.reborn.vn/rewards/voucher50k.jpg"
        createdAt:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-10T00:00:00Z"

    RewardInput:
      type: object
      required: [name, pointCost, type]
      properties:
        _id:
          type: string
          description: Truyen _id de cap nhat, bo trong de tao moi
        name:
          type: string
          example: "Voucher giam 50k"
        description:
          type: string
          example: "Giam 50.000d cho don tiep theo"
        pointCost:
          type: integer
          example: 100
        type:
          type: string
          enum: [voucher, gift, service, discount]
          example: voucher
        value:
          type: number
          example: 50000
        stock:
          type: integer
          example: 200
        isActive:
          type: boolean
          default: true
        imageUrl:
          type: string
          nullable: true

    # ── Segment (Tier) ──
    Segment:
      type: object
      properties:
        _id:
          type: string
          example: seg01
        name:
          type: string
          example: Gold
        description:
          type: string
          example: "Hang vang - tich luy tu 5.000 diem"
        minPoint:
          type: integer
          description: Diem toi thieu de dat hang nay
          example: 5000
        maxPoint:
          type: integer
          description: Diem toi da cua hang nay
          example: 19999
        multiplier:
          type: number
          description: He so nhan diem (1.0 = khong nhan)
          example: 1.5
        color:
          type: string
          description: Ma mau hien thi
          example: "#FFD700"
        order:
          type: integer
          description: Thu tu sap xep (nho = thap hon)
          example: 2
        benefits:
          type: array
          description: Danh sach quyen loi cua hang
          items:
            type: string
          example: ["Giam 10% dich vu", "Uu tien dat lich"]
        createdAt:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-15T00:00:00Z"

    SegmentInput:
      type: object
      required: [name, minPoint]
      properties:
        _id:
          type: string
          description: Truyen _id de cap nhat, bo trong de tao moi
        name:
          type: string
          example: Gold
        description:
          type: string
          example: "Hang vang - tich luy tu 5.000 diem"
        minPoint:
          type: integer
          example: 5000
        maxPoint:
          type: integer
          example: 19999
        multiplier:
          type: number
          default: 1.0
          example: 1.5
        color:
          type: string
          example: "#FFD700"
        order:
          type: integer
          example: 2
        benefits:
          type: array
          items:
            type: string

    # ── Config ──
    LoyaltyConfig:
      type: object
      properties:
        _id:
          type: string
          example: cfg001
        exchangeRate:
          type: number
          description: So tien VND doi duoc 1 diem (vi du 10000 = 10.000d/diem)
          example: 10000
        pointUnit:
          type: string
          description: Don vi diem hien thi
          example: "diem"
        extendedConfig:
          type: object
          description: Cau hinh mo rong (JSON tu do)
          properties:
            enableAutoEarn:
              type: boolean
              description: Bat/tat tu dong tich diem tu POS
              example: true
            enableRewardRedeem:
              type: boolean
              description: Bat/tat chuc nang doi thuong
              example: true
            pointExpireDays:
              type: integer
              description: So ngay het han diem (0 = khong het han)
              example: 365
            minEarnAmount:
              type: number
              description: Gia tri don hang toi thieu de duoc tich diem (VND)
              example: 50000
            birthdayBonus:
              type: integer
              description: Diem tang them vao ngay sinh nhat
              example: 100
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-01T00:00:00Z"

    LoyaltyConfigInput:
      type: object
      properties:
        exchangeRate:
          type: number
          example: 10000
        pointUnit:
          type: string
          example: "diem"
        extendedConfig:
          type: object
          additionalProperties: true
          example:
            enableAutoEarn: true
            enableRewardRedeem: true
            pointExpireDays: 365
            minEarnAmount: 50000
            birthdayBonus: 100

    # ── Program ──
    Program:
      type: object
      properties:
        _id:
          type: string
          example: prg001
        name:
          type: string
          example: "Tich diem mua he 2026"
        description:
          type: string
          example: "Nhan x2 diem cho moi giao dich tu 01/06 - 31/08"
        type:
          type: string
          enum: [multiplier, bonus, category]
          description: "Loai chuong trinh: multiplier (nhan diem), bonus (cong them), category (theo danh muc)"
          example: multiplier
        multiplier:
          type: number
          description: He so nhan diem (chi ap dung khi type = multiplier)
          example: 2
        bonusPoint:
          type: integer
          description: Diem thuong them (chi ap dung khi type = bonus)
          nullable: true
        startDate:
          type: string
          format: date-time
          example: "2026-06-01T00:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2026-08-31T23:59:59Z"
        isActive:
          type: boolean
          example: true
        conditions:
          type: object
          description: Dieu kien ap dung chuong trinh
          properties:
            minOrderAmount:
              type: number
              description: Gia tri don hang toi thieu (VND)
              example: 100000
            applicableBranches:
              type: array
              description: Danh sach ID chi nhanh ap dung (rong = tat ca)
              items:
                type: string
              example: ["br01", "br02"]
            applicableCategories:
              type: array
              description: Danh sach ID danh muc san pham ap dung (rong = tat ca)
              items:
                type: string
              example: []
        createdAt:
          type: string
          format: date-time
          example: "2026-04-01T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-15T00:00:00Z"

    ProgramInput:
      type: object
      required: [name, type, startDate, endDate]
      properties:
        _id:
          type: string
          description: Truyen _id de cap nhat, bo trong de tao moi
        name:
          type: string
          example: "Tich diem mua he 2026"
        description:
          type: string
          example: "Nhan x2 diem cho moi giao dich tu 01/06 - 31/08"
        type:
          type: string
          enum: [multiplier, bonus, category]
          example: multiplier
        multiplier:
          type: number
          example: 2
        bonusPoint:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
          example: "2026-06-01T00:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2026-08-31T23:59:59Z"
        isActive:
          type: boolean
          default: true
        conditions:
          type: object
          properties:
            minOrderAmount:
              type: number
            applicableBranches:
              type: array
              items:
                type: string
            applicableCategories:
              type: array
              items:
                type: string

  responses:
    Unauthorized:
      description: Chua xac thuc hoac token het han
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: "Token khong hop le hoac da het han"
            result: null

    NotFound:
      description: Khong tim thay tai nguyen
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 404
            message: "Khong tim thay ban ghi"
            result: null

    Conflict:
      description: Xung dot du lieu (vi du: trung customerId)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 409
            message: "Vi thanh vien cho khach hang nay da ton tai"
            result: null

    TooManyRequests:
      description: Vuot qua gioi han request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 429
            message: "Qua nhieu request, vui long thu lai sau"
            result: null
