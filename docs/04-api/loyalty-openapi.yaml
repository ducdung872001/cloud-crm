                  _id: cfg001
                  exchangeRate: 10000
                  pointUnit: "diem"
                  extendedConfig:
                    enableAutoEarn: true
                    enableRewardRedeem: true
                    pointExpireDays: 365
                    minEarnAmount: 50000
                    birthdayBonus: 100
                  updatedAt: "2026-04-16T10:00:00Z"
