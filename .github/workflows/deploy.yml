name: Deploy on build commit

on:
  push:
    branches: [reborn-tnpm]

jobs:
  deploy:
    if: contains(github.event.head_commit.message, 'build')
    runs-on: ubuntu-latest

    steps:
      - name: SSH vào server và chạy deploy.sh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo su - reborn -c "bash /home/reborn/reborn-devops/projects/rox/deploy.sh tnpm"
